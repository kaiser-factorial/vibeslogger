name: CI

# Runs the type checker and test suite on every pull request and on pushes to
# master, so broken types or failing tests are caught automatically.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # package-lock.json was regenerated (PR #4) and is now kept in sync with
      # package.json, so npm ci can enforce a reproducible, exact-match install.
      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
